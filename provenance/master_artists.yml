- master_artist_id: "ma_beardsley_001"
  name: "Aubrey Beardsley"
  type: "illustrator"
  era: "late_19th_century"
  life_dates: "1872–1898"
  region: "United_Kingdom"
  primary_domains:
    - "book_illustration"
    - "decorative_graphic_art"
