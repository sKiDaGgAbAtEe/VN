        this design.

  master_artist_bands:
    - master_artist_id: "ma_yumeji_001"
      role: "portrait_mood_reference"
      influence_notes: >
        Provides a historical lineage for gentle, melancholic girl portraits
        and introspective gazes.

    - master_artist_id: "ma_beardsley_001"
      role: "dark_decorative_lineage"
      influence_notes: >
        Used conceptually for dark, flowing linework, ornamental black
        shapes, and gothic elegance in Rose's special-event outfits and CG
        framing.

    - master_artist_id: "ma_mucha_001"
      role: "iconic_feminine_framing"
      influence_notes: >
        Offers a public-domain precedent for framing a woman as an icon:
        halo-like decorative elements, floral motifs (roses), and flowing
        hair.

