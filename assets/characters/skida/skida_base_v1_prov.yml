transformations:
  description: >
    Neutral full-body Skida sprite in everyday rolled-sleeve shirt mode: a lean,
    adult, blue-haired man whose posture signals structural support—nurturing,
    attentive, and quietly intense.
  steps:
    - step: 1
      summary: "Combined three existing avatars into unified facial design: adult jawline, straight nose, soft blue eyes, layered deep-blue hair with side-swept fringe."
    - step: 2
      summary: "Defined proportions: slightly above-average height, lean/wiry, relaxed shoulders, natural V without exaggerated bulk."
    - step: 3
      summary: "Baseline outfit: light shirt with sleeves rolled to mid-forearm, top button undone, subtle wrinkles suggesting constant work. Dark trousers."
    - step: 4
      summary: "Established posture: feet shoulder-width apart, weight slightly forward, shoulders open. 'I'm here, I'm listening, I've got this.'"
    - step: 5
      summary: "Expression: calm, present neutrality. Brows relaxed, eyes attentive, mouth at slight line that easily lifts."
    - step: 6
      summary: "Final shading: hair sheen and shirt folds aligned with internal refs, blue hair/eyes saturated but not cartoonish."

