transformations:
  description: >
    Big oversized hoodie variant — Skida as a portable safe space. Deep charcoal,
    muted blue, or forest green. Slim joggers. The hoodie is large enough that
    it could wrap someone else. That's intentional.
  steps:
    - step: 1
      summary: "Oversized hoodie to mid-hip or lower, roomy hood, wide kangaroo pocket."
    - step: 2
      summary: "Deep charcoal / muted blue / forest green — quiet, non-flashy colors."
    - step: 3
      summary: "Slim joggers or jeans underneath so silhouette reads relaxed but not shapeless."
    - step: 4
      summary: "Expression: softer than baseline — slightly tired, slightly warm. 'Come here if you need to.'"
    - step: 5
      summary: "Hood up variant: adds mystery and a sense of him retreating into himself."

