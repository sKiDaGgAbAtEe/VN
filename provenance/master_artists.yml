    - "ornate_decorative_borders"
    - "flat_inked_black_shapes"
    - "elongated_figures"
    - "finely_detailed_hair_and_fabric"
    - "gothic_and_decadent_tones"
    - "asymmetrical_compositions"
  vn_reference_scope:
    description: >
      Used as a public-domain lineage for dark decorative linework and gothic
      elegance—especially for Rose-related outfits, roses, and frame motifs.
    recommended_uses:
      - "gothic_frame_elements_around_CGs"
      - "rose_and_vine_border_motifs"
      - "decorative_black_shapes_in_backgrounds"
      - "ornamental_accents_on_clothing_and_UI"
    avoid:
      - "direct_tracing_or_redraw_of_specific_illustrations"
      - "copying_unique_character_poses_or_silhouettes"
      - "lifting_entire_compositions_or_page_layouts"
  ethical_notes: >
    Beardsley's works are in the public domain. Within the Micro-SSAD VN
    protocol, this lineage is treated as a historical style reference only.
  tags:
    - "public_domain"
    - "gothic"
    - "decorative"
    - "black_and_white"
    - "rose_lineage"

