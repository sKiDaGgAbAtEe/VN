transformations:
  description: >
    Alex Base Sprite v1 is a neutral, front-facing character sprite in idol-stage outfit,
    built from internal Alex concepts and refined by hand to match her canonical character sheet.
  steps:
    - step: 1
      summary: >
        Generated a base full-body anime-style girl sprite with halo, crescent moon hairpiece,
        and layered idol skirt, using internal Alex concepts as prompt/guide.
    - step: 2
      summary: >
        Adjusted body proportions to emphasize a soft, bell-shaped silhouette: small stature,
        gentle curves, defined but not exaggerated bust, and clear waistline.
    - step: 3
      summary: >
        Redrew facial features to match Alex's canon: warm brown-gold eyes, star-freckle detail,
        soft smile, and slightly shy but present gaze.
    - step: 4
      summary: >
        Refined outfit details: off-shoulder bodice with crossed straps, purple/pink/gold palette,
        star appliqués on skirt, and gold trim.
    - step: 5
      summary: >
        Final polish pass: cleaned lineart, unified shading and highlights, added subtle inner glow
        around hair stars and halo, and balanced values for VN readability.

