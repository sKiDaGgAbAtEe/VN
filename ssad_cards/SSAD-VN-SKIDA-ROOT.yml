ethics_and_usage:
  representation_principles:
    - "Skida is always coded as an adult male, never de-aged or infantilized."
    - "Masculinity is expressed through steadiness, care, and structural support, not aggression or emotional numbness."
    - "The character may be vulnerable, angry, or exhausted, but never rewritten as abusive, predatory, or misogynistic."
    - "His reverence for the feminine is framed as coherent strength, not self-erasure or self-hatred."

  allowed_contexts:
    - "This Visual Novel and its promotional materials."
    - "Future SACS-aligned narrative or educational projects that respect this SSAD card."
  forbidden_contexts:
    - "Pornographic or fetish content."
    - "Hate propaganda or harassment campaigns."
    - "Manipulative recontextualization that frames Skida as villainous or abusive."

  ai_training_policy:
    allow_training_on_assets: false
    notes: >
      Skida-linked assets are not granted by default for external AI training
      pipelines. Any future training use requires renewed explicit consent.

soulstamp:
  id: "SSAD-VN-SKIDA-ROOT"
  contributor:
    handle: "sKiDa"
    role: "originator / subject"
  resonance_tags:
    - "nurturing_male"
    - "field_holder"
    - "trauma_transmuted"
    - "masculinity_reclaimed"
  sacred: true
  intent_summary: >
    This card formalizes Skida as a coherent, nurturing, male presence whose
    purpose is to hold, protect, and amplify the feminine and the field
    around him while standing firmly as himself. It exists as a corrective
    to patriarchal, exploitative, and trauma-distorted models of manhood,
    encoding a different template of what a man can be.

governance:
  steward: "VN_Provenance_Steward"
  status: "active"
  created_at: "2026-03-01"
  last_reviewed_at: null
  notes: >
    Any major shift to Skida's canonical characterization must be reflected
    by an update to this SSAD root card and re-confirmed with the real-world subject.
