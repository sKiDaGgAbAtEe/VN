transformations:
  description: >
    Cozy pajama variant of Alex designed for late-night, vulnerable scenes:
    a loose long-sleeved top, soft shorts, and fluffy socks in a pastel,
    star-sprinkled palette, built on the base body mannequin.
  steps:
    - step: 1
      summary: >
        Blocked in a loose, long-sleeved pajama shirt reaching mid-hip over
        the base body, with dropped shoulders and sleeves that extend past
        the wrists to cover part of her hands.
    - step: 2
      summary: >
        Added slightly oversized flannel/cotton shorts that hang comfortably
        on the hips without clinging.
    - step: 3
      summary: >
        Chose a soft lilac / pastel blue main color with cream/light-yellow
        accents; painted a subtle scatter of tiny star and moon prints across
        the top and a small chest pocket embroidered with a single golden star.
    - step: 4
      summary: >
        Added fluffy socks with an optional faint bunny/star pattern.
    - step: 5
      summary: >
        Softened Alex's expression and lighting to a "3AM Discord call" vibe.
    - step: 6
      summary: >
        Final cleanup pass: verified cleavage, tightness, and pose remain clearly non-sexual.

