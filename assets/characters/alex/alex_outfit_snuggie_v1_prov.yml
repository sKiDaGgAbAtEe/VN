transformations:
  description: >
    Oversized snuggie hoodie variant of Alex: a walking blanket look used for
    comfort-mode scenes and late-night streaming, emphasizing warmth and
    safety rather than sex appeal.
  steps:
    - step: 1
      summary: >
        Sketched a huge hoodie that falls to mid-thigh with dropped shoulders,
        a roomy torso, and long sleeves that cover most of Alex's hands.
    - step: 2
      summary: >
        Added a large hood sized so her halo can sit above or glow subtly
        behind it; ensured the crescent hair clip and star scatter still peek
        out around the hood.
    - step: 3
      summary: >
        Set the main fabric color to deep navy/desaturated purple with a soft
        gold or cream lining; added subtle constellation patterns along the
        sleeves and back.
    - step: 4
      summary: >
        Chose simple leggings or bare legs plus chunky, fluffy slippers.
    - step: 5
      summary: >
        Softened Alex's expression to a relaxed, slightly tired smile.
    - step: 6
      summary: >
        Final clean-up; verified pose, camera angle, and fabric remain clearly non-sexual.

