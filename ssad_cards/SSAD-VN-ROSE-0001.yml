      Use is permitted within the Astrica VN project and related non-commercial
      materials, provided Rose is credited as the original artist. Any
      commercial or external reuse beyond the VN requires explicit further
      consent from Rose.
    proof_note: >
      Permission was given directly by Rose in private communication with
      the VN team; details retained off-chain for privacy.

lineage:
