      Formalized Rose's design into a VN character sheet, set the ethical and
      stylistic constraints for derivatives, and integrated public-domain
      lineage references for future sprites and CGs.

origin:
  mode: "hand_drawn_digital"
  tools:
    - "digital_paint_software"
  created_by: "Rose"
  created_at: "unknown_pre_VN"
  input_reference_summary: >
    Purely original digital character portrait by Rose, not derived from
    third-party IP. The piece established Rose's black glasses, golden eyes,
    dark-to-blonde ombré hair, red rose hair clip, black choker, and soft
    goth sweater silhouette. No AI tools were used in the original work.

permissions:
  artist_grant:
